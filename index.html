<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Shim to prevent: TypeError: Cannot set property fetch of #<Window> which has only a getter
      (function() {
        try {
          const target = typeof globalThis !== 'undefined' ? globalThis : window;
          const descriptor = Object.getOwnPropertyDescriptor(target, 'fetch');
          if (descriptor && !descriptor.writable && descriptor.configurable) {
            const originalFetch = target.fetch;
            let customFetch = originalFetch;
            Object.defineProperty(target, 'fetch', {
              get() {
                return customFetch;
              },
              set(val) {
                customFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Unable to patch fetch descriptor:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
